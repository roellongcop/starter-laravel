name: CI

on:
  push:
    branches: [master, postgres]
  pull_request:
  workflow_dispatch:

# Only run the latest commit per branch/PR; cancel superseded runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Pint, Larastan, Pest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4' # matches docker/app/Dockerfile
          # gd: Glide image tests; pdo_sqlite/sqlite3: the in-memory test DB.
          extensions: mbstring, intl, bcmath, gd, exif, zip, pcntl, fileinfo, dom, curl, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Pint (code style, check only)
        run: vendor/bin/pint --test

      - name: Larastan (static analysis)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Tests (Pest)
        run: php artisan test --exclude-group=pg

  backend-pg:
    name: Backend Postgres integration (backup/restore round-trip)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: keen_admin_test
          POSTGRES_USER: keen
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U keen -d keen_admin_test"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, bcmath, gd, exif, zip, pcntl, fileinfo, dom, curl, pdo_pgsql, pgsql
          coverage: none
          tools: composer:v2

      # pg_dump/psql for the real backup/restore. ubuntu-24.04 ships client 16,
      # matching the postgres:16 service (pg_dump requires client >= server major).
      - name: Install postgresql-client (pg_dump/psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Postgres integration tests (group "pg")
        run: php artisan test --group=pg
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: keen_admin_test
          DB_USERNAME: keen
          DB_PASSWORD: secret

  frontend:
    name: Frontend (Prettier, ESLint, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      # The SSR build (vite build --ssr) imports Ziggy's route() from the
      # vendored composer package via a Vite alias, so vendor/ must exist.
      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # matches the node:20-alpine compose image
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier (format check)
        run: npm run format:check

      - name: ESLint (lint check)
        run: npm run lint:check

      - name: Type-check & build
        run: npm run build
