services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: keen-admin/app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [appnet]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks: [appnet]

  # Dev-only Vite server. Excluded from the default `up` (production-like, runs
  # prebuilt assets) via the "dev" profile; started explicitly by `make dev`.
  node:
    image: node:20-alpine
    profiles: ["dev"]
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks: [appnet]

  queue:
    image: keen-admin/app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan queue:work --tries=3 --timeout=300
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    networks: [appnet]

  scheduler:
    image: keen-admin/app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan schedule:work
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    networks: [appnet]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-keen_admin}
      POSTGRES_USER: ${DB_USERNAME:-keen}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      # Host-side forward only (the app connects to postgres:5432 internally).
      - "${DB_FORWARD_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Runs only on first init of a fresh volume — creates keen_admin_test for `make test-pg`.
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-keen} -d ${DB_DATABASE:-keen_admin}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [appnet]

  adminer:
    image: adminer:5
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      - postgres
    networks: [appnet]

  # Local SMTP sink with a web inbox — the mail analogue of SeaweedFS. Mail goes
  # here whenever MAIL_MAILER=smtp + MAIL_HOST=mailpit (the dev default).
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      # Accept any/insecure AUTH so the Email tab's optional creds aren't rejected in dev.
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "${MAILPIT_PORT:-8025}:8025" # web inbox (SMTP 1025 stays internal on appnet)
    networks: [appnet]

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: "server -dir=/data -s3 -s3.port=8333 -master.volumeSizeLimitMB=1024"
    ports:
      - "${S3_PORT:-8333}:8333"
      - "${S3_MASTER_PORT:-9333}:9333"
      # Filer web UI — browse stored objects under /buckets/<bucket>/
      - "${S3_FILER_PORT:-8888}:8888"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      # Use 127.0.0.1 (not localhost) — inside the container localhost resolves
      # to ::1 (IPv6) while SeaweedFS binds IPv4, which fails the probe.
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [appnet]

  seaweedfs-init:
    image: amazon/aws-cli:latest
    entrypoint: ["/bin/sh", "/init/init-buckets.sh"]
    environment:
      AWS_ENDPOINT: http://seaweedfs:8333
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-seaweedfs}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-seaweedfs}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      BUCKETS: "backups exports imports uploads"
    volumes:
      - ./docker/seaweedfs:/init:ro
    depends_on:
      seaweedfs:
        condition: service_healthy
    restart: "no"
    networks: [appnet]

networks:
  appnet:
    driver: bridge

volumes:
  postgres-data:
  seaweedfs-data:
