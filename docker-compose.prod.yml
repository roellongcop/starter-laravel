# Production override for a Docker-capable VPS. Layer it on top of the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What it changes vs. the dev stack (see docs/infrastructure/deployment.md):
#   - restart: always (survive host reboots, not just crashes)
#   - stops publishing the database, SeaweedFS, and Adminer ports to the host —
#     only Caddy is reachable, on :80 + :443, terminating TLS itself
#   - swaps the internal :80 Caddyfile for the domain-driven TLS Caddyfile
#     (needs APP_DOMAIN + TLS_EMAIL in the environment; see deployment.md)
#   - parks Adminer behind a "debug" profile so it isn't started by default
#
# The app code is still bind-mounted from the host, so deploy = `git pull` on the
# host + `composer install --no-dev --optimize-autoloader` + `npm run build` +
# `php artisan migrate --force` + `php artisan optimize` (full runbook in the doc).
services:
  app:
    restart: always

  caddy:
    restart: always
    # Caddy terminates TLS itself — automatic HTTPS (Let's Encrypt) for APP_DOMAIN,
    # certs persisted in the caddy-data volume. Publish 80 (ACME challenge + HTTPS
    # redirect) and 443 (TCP + UDP for HTTP/3). No external proxy needed.
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN (e.g. example.com) in .env}
      TLS_EMAIL: ${TLS_EMAIL:?set TLS_EMAIL (ACME account email) in .env}
    ports: !override
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes: !override
      - ./:/var/www/html
      - ./docker/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  queue:
    restart: always

  scheduler:
    restart: always

  # SSR renderer: deps come from the deploy's npm install, so just run the bundle.
  ssr:
    restart: always
    command: node bootstrap/ssr/ssr.js
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:13714/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    restart: always
    # Don't expose the database to the host/internet — the app reaches it on the
    # internal appnet as postgres:5432.
    ports: !reset []

  seaweedfs:
    restart: always
    # Object storage stays internal; the app reaches it at http://seaweedfs:8333.
    ports: !reset []

  # Production sends mail via real SMTP, so the local Mailpit sink isn't needed.
  # Park it behind the "debug" profile so it isn't started (and its inbox isn't
  # exposed) by default.
  mailpit:
    profiles: ["debug"]
    restart: always

  # Adminer is a convenience, not a production service. Keep it off by default;
  # start it only when you need it:  docker compose --profile debug up -d adminer
  adminer:
    profiles: ["debug"]
    restart: always
