services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: keen-admin/app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [appnet]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    networks: [appnet]

  # Dev-only Vite server. Excluded from the default `up` (production-like, runs
  # prebuilt assets) via the "dev" profile; started explicitly by `make dev`.
  node:
    image: node:20-alpine
    profiles: ["dev"]
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks: [appnet]

  queue:
    image: keen-admin/app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan queue:work --tries=3 --timeout=300
    depends_on:
      mariadb:
        condition: service_healthy
      app:
        condition: service_started
    networks: [appnet]

  scheduler:
    image: keen-admin/app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan schedule:work
    depends_on:
      mariadb:
        condition: service_healthy
      app:
        condition: service_started
    networks: [appnet]

  # Inertia SSR renderer (public pages only). See docs/features/seo-and-ssr.md.
  ssr:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    # Wait for the SSR bundle before launching node — on a cold boot the asset
    # build may not have emitted bootstrap/ssr/ssr.js yet, which would otherwise
    # crash-loop the renderer and serve client-only (empty-body) HTML meanwhile.
    command: sh -c "npm install --no-audit --no-fund && until [ -f bootstrap/ssr/ssr.js ]; do echo 'waiting for SSR bundle (bootstrap/ssr/ssr.js)...'; sleep 2; done && node bootstrap/ssr/ssr.js"
    depends_on:
      app:
        condition: service_started
    networks: [appnet]

  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-keen_admin}
      MARIADB_USER: ${DB_USERNAME:-keen}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      # Host-side forward only (the app connects to mariadb:3306 internally).
      - "${DB_FORWARD_PORT:-3306}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [appnet]

  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "${PMA_PORT:-8081}:80"
    depends_on:
      - mariadb
    networks: [appnet]

  # Local SMTP sink with a web inbox — the mail analogue of SeaweedFS. Mail goes
  # here whenever MAIL_MAILER=smtp + MAIL_HOST=mailpit (the dev default).
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      # Accept any/insecure AUTH so the Email tab's optional creds aren't rejected in dev.
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "${MAILPIT_PORT:-8025}:8025" # web inbox (SMTP 1025 stays internal on appnet)
    networks: [appnet]

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: "server -dir=/data -s3 -s3.port=8333 -master.volumeSizeLimitMB=1024"
    ports:
      - "${S3_PORT:-8333}:8333"
      - "${S3_MASTER_PORT:-9333}:9333"
      # Filer web UI — browse stored objects under /buckets/<bucket>/
      - "${S3_FILER_PORT:-8888}:8888"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      # Use 127.0.0.1 (not localhost) — inside the container localhost resolves
      # to ::1 (IPv6) while SeaweedFS binds IPv4, which fails the probe.
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [appnet]

  seaweedfs-init:
    image: amazon/aws-cli:latest
    entrypoint: ["/bin/sh", "/init/init-buckets.sh"]
    environment:
      AWS_ENDPOINT: http://seaweedfs:8333
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-seaweedfs}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-seaweedfs}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      BUCKETS: "backups exports imports uploads"
    volumes:
      - ./docker/seaweedfs:/init:ro
    depends_on:
      seaweedfs:
        condition: service_healthy
    restart: "no"
    networks: [appnet]

networks:
  appnet:
    driver: bridge

volumes:
  mariadb-data:
  seaweedfs-data:
  caddy-data:
  caddy-config:
